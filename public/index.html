<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ZA — Карточная игра</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
/* === RESET & BASE === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Montserrat', sans-serif;
  background: #0f2e1a;
  color: #eee;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* === SCREENS === */
.screen { display: none; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
.screen.active { display: flex; }
.hidden { display: none !important; }

/* === HOME SCREEN === */
#home-screen {
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 60px;
  background: radial-gradient(ellipse at center, #1a4a2a 0%, #0f2e1a 70%);
  gap: 16px;
  overflow-y: auto;
}
.logo { font-size: 96px; font-weight: 900; color: #f0c040; text-shadow: 0 4px 20px rgba(240,192,64,0.4); letter-spacing: 12px; }
.logo-sub { font-size: 14px; color: #8ab89a; margin-top: -10px; letter-spacing: 4px; text-transform: uppercase; }
.home-form { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 20px; width: 300px; }
input {
  width: 100%; padding: 12px 16px; border-radius: 8px; border: 2px solid #2a6a3a;
  background: #0d2216; color: #eee; font-size: 16px; font-family: 'Montserrat', sans-serif;
  outline: none; transition: border-color 0.2s;
}
input:focus { border-color: #f0c040; }
input::placeholder { color: #5a8a6a; }
.btn {
  padding: 12px 24px; border-radius: 8px; border: none; font-size: 16px; font-weight: 700;
  font-family: 'Montserrat', sans-serif; cursor: pointer; transition: all 0.2s; width: 100%;
}
.btn-primary { background: #f0c040; color: #111; }
.btn-primary:hover { background: #f5d060; transform: translateY(-1px); }
.btn-primary:disabled { background: #5a5a3a; color: #888; cursor: not-allowed; transform: none; }
.btn-secondary { background: #2a6a3a; color: #eee; }
.btn-secondary:hover { background: #3a8a4a; }
.join-section { display: none; width: 100%; gap: 8px; flex-direction: column; }
.join-section.show { display: flex; }
.btn-small { padding: 8px 16px; font-size: 14px; }
.error-msg { color: #ff6b6b; font-size: 13px; min-height: 20px; text-align: center; }

/* FIX 2: Rooms list */
.rooms-section { width: 300px; margin-top: 16px; padding-bottom: 40px; }
.rooms-title { font-size: 13px; color: #8ab89a; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; text-align: center; }
.rooms-list { display: flex; flex-direction: column; gap: 8px; max-height: 260px; overflow-y: auto; }
.room-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px; background: rgba(0,0,0,0.25); border-radius: 8px;
}
.room-info { display: flex; flex-direction: column; gap: 2px; }
.room-code-small { font-size: 14px; font-weight: 700; color: #f0c040; }
.room-host { font-size: 11px; color: #8ab89a; }
.room-status-text { font-size: 11px; }
.room-status-text.waiting { color: #f0c040; }
.room-status-text.playing { color: #4caf50; }
.room-status-text.full { color: #e74c3c; }
.room-item .btn { width: auto; min-width: 80px; font-size: 12px; padding: 6px 12px; }
.no-rooms { text-align: center; color: #5a8a6a; font-size: 13px; padding: 12px; }

/* === LOBBY SCREEN === */
#lobby-screen {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at center, #1a4a2a 0%, #0f2e1a 70%);
  gap: 16px;
}
.room-code { font-size: 48px; font-weight: 900; color: #f0c040; letter-spacing: 8px; }
.share-btn {
  background: none; border: 1px solid #f0c040; color: #f0c040; padding: 8px 20px;
  border-radius: 6px; cursor: pointer; font-family: 'Montserrat', sans-serif; font-size: 13px;
  transition: all 0.2s;
}
.share-btn:hover { background: rgba(240,192,64,0.1); }
.share-btn.copied { border-color: #4caf50; color: #4caf50; }
.player-list {
  list-style: none; width: 320px; margin: 16px 0;
  background: rgba(0,0,0,0.2); border-radius: 12px; padding: 12px;
}
.player-list li {
  padding: 10px 14px; border-radius: 6px; display: flex; align-items: center; gap: 10px;
  font-size: 15px;
}
.player-list li + li { border-top: 1px solid rgba(255,255,255,0.05); }
.host-badge {
  background: #f0c040; color: #111; font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 10px; text-transform: uppercase;
}
.lobby-status { color: #8ab89a; font-size: 14px; }
.lobby-back { position: absolute; top: 20px; left: 20px; background: none; border: none; color: #8ab89a; cursor: pointer; font-family: 'Montserrat', sans-serif; font-size: 14px; }

/* === GAME SCREEN === */
#game-screen {
  flex-direction: column;
  background: radial-gradient(ellipse at center, #1a4a2a 0%, #0f2e1a 70%);
  position: relative;
  overflow: hidden;
}

/* FIX 6: Timer bar */
.timer-bar {
  width: 100%; height: 28px; background: rgba(0,0,0,0.3);
  position: relative; z-index: 5; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.timer-fill {
  position: absolute; left: 0; top: 0; height: 100%;
  background: #4caf50; transition: width 1s linear;
}
.timer-text {
  position: relative; z-index: 1; font-size: 13px; font-weight: 700; color: white;
}

/* Other players */
.opponents-row {
  display: flex; justify-content: center; gap: 16px; padding: 10px 16px;
  flex-wrap: wrap; z-index: 2; flex-shrink: 0;
}
.opponent {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 8px 12px; border-radius: 10px; background: rgba(0,0,0,0.2); min-width: 70px;
  transition: all 0.3s;
}
.opponent.current-turn { background: rgba(240,192,64,0.15); box-shadow: 0 0 12px rgba(240,192,64,0.3); }
.opponent.finished { opacity: 0.4; }
.opponent-cards { display: flex; gap: -4px; }
.card-back {
  width: 18px; height: 26px; background: linear-gradient(135deg, #c0392b, #8e2320);
  border-radius: 3px; border: 1px solid #a33; margin-left: -6px;
}
.card-back:first-child { margin-left: 0; }
.opponent-name { font-size: 11px; color: #ccc; white-space: nowrap; max-width: 80px; overflow: hidden; text-overflow: ellipsis; }

/* Table center */
.table-center {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; z-index: 1; position: relative;
}

/* FIX 8: Turn status in center */
.turn-status {
  font-size: 26px; font-weight: 900; margin-bottom: 12px;
  transition: opacity 0.4s ease-in;
  min-height: 36px; text-align: center;
}
.turn-status.your-turn { color: #f0c040; text-shadow: 0 0 20px rgba(240,192,64,0.6); }
.turn-status.other-turn { color: #8ab89a; }

.table-cards { display: flex; gap: 6px; align-items: center; min-height: 100px; flex-wrap: wrap; justify-content: center; }
.combo-label {
  font-size: 20px; font-weight: 900; color: #f0c040; margin-top: 10px;
  text-shadow: 0 2px 10px rgba(240,192,64,0.5); text-align: center;
}
.combo-flash { animation: comboFlash 0.6s ease-out; }
@keyframes comboFlash {
  0% { transform: scale(0.5); opacity: 0; }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); opacity: 1; }
}
.trick-msg {
  position: absolute; font-size: 18px; font-weight: 700; color: #4caf50;
  animation: trickFade 2s forwards; pointer-events: none;
}
@keyframes trickFade {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-30px); }
}
.new-trick-label { font-size: 14px; color: #8ab89a; }

/* FIX 5: Observer banner */
.observer-banner {
  text-align: center; padding: 10px 20px; background: rgba(240,192,64,0.15);
  color: #f0c040; font-size: 14px; font-weight: 600; z-index: 10;
  border-top: 1px solid rgba(240,192,64,0.2);
}

/* Player hand */
.hand-area {
  padding: 8px 16px 0; display: flex; flex-direction: column; align-items: center;
  z-index: 3; background: linear-gradient(transparent, rgba(0,0,0,0.3));
  padding-bottom: 80px; /* FIX 1: Space for fixed buttons */
}
.hand-cards {
  display: flex; justify-content: center; gap: 2px; flex-wrap: nowrap;
  overflow-x: auto; max-width: 100vw; padding: 8px 4px 4px;
  -webkit-overflow-scrolling: touch;
}

/* FIX 1: Fixed bottom action bar */
.action-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; gap: 10px; padding: 10px 16px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  justify-content: center; z-index: 50;
  background: rgba(15, 46, 26, 0.95);
  border-top: 1px solid rgba(255,255,255,0.05);
}
.action-bar .btn {
  width: auto; min-width: 110px;
  min-height: 56px; /* FIX 1 */
  font-size: 18px; /* FIX 1 */
  padding: 12px 20px;
  display: flex; align-items: center; justify-content: center;
}
.btn-pass { background: #555; color: #eee; }
.btn-pass:hover { background: #666; }

/* FIX 12: Auto-pass button */
.btn-autopass { background: #444; color: #aaa; font-size: 13px !important; min-width: 90px !important; min-height: 56px; }
.btn-autopass.active { background: #e67e22; color: #fff; }

/* FIX 12: Auto-pass banner */
.autopass-banner {
  position: fixed; top: 32px; left: 50%; transform: translateX(-50%);
  background: rgba(230,126,34,0.9); color: #fff; padding: 6px 16px;
  border-radius: 20px; font-size: 12px; font-weight: 600; z-index: 60;
}

.turn-indicator {
  font-size: 13px; padding: 4px 12px; border-radius: 20px; margin-bottom: 4px;
  background: rgba(240,192,64,0.15); color: #f0c040; font-weight: 600;
  display: none; /* FIX 8: replaced by turn-status in center */
}

/* FIX 17: Share button in game */
.share-game-btn {
  position: absolute; top: 6px; right: 10px; background: none;
  border: 1px solid rgba(240,192,64,0.4); color: #f0c040; padding: 4px 12px;
  border-radius: 6px; cursor: pointer; font-family: 'Montserrat', sans-serif;
  font-size: 11px; z-index: 10; transition: all 0.2s;
}
.share-game-btn:hover { background: rgba(240,192,64,0.1); }

/* Cards */
.card {
  width: 52px; height: 74px; background: #fafafa; border-radius: 6px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; position: relative;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3); flex-shrink: 0;
  user-select: none; -webkit-user-select: none; border: 2px solid transparent;
}
.card:hover { transform: translateY(-4px); }
.card.selected { transform: translateY(-14px); box-shadow: 0 6px 16px rgba(240,192,64,0.4); border-color: #f0c040; }
.card .rank { font-size: 16px; font-weight: 900; line-height: 1; }
.card .suit { font-size: 14px; line-height: 1; }
.card.red .rank, .card.red .suit { color: #c0392b; }
.card.black .rank, .card.black .suit { color: #222; }
.card.joker { background: linear-gradient(135deg, #f0c040, #e6a817); }
.card.joker .rank { color: #111; font-size: 12px; }
.card.joker .suit { color: #111; font-size: 18px; }
.table-card { cursor: default; }
.table-card:hover { transform: none; }

/* FIX 3: Drag & drop styles */
.card.dragging { opacity: 0.4; }
.card.drag-over-left { border-left: 3px solid #f0c040; }
.card.drag-over-right { border-right: 3px solid #f0c040; }

/* Shake animation for invalid move */
.shake { animation: shake 0.4s ease-in-out; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}
.invalid-tooltip {
  position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%);
  background: #e74c3c; color: white; padding: 8px 16px; border-radius: 8px;
  font-size: 13px; font-weight: 600; z-index: 100; animation: tooltipFade 2s forwards;
  white-space: nowrap;
}
@keyframes tooltipFade {
  0%,70% { opacity: 1; }
  100% { opacity: 0; }
}

/* Toast notification */
.toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
  background: rgba(76,175,80,0.9); color: white; padding: 8px 20px;
  border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 200;
  animation: tooltipFade 2.5s forwards; pointer-events: none;
}

/* Game log */
.game-log {
  position: absolute; bottom: 100px; right: 10px; width: 220px;
  overflow-y: auto; z-index: 10; display: flex; flex-direction: column; gap: 2px;
  font-size: 11px; pointer-events: none;
}
.log-entry { padding: 3px 8px; background: rgba(0,0,0,0.4); border-radius: 4px; color: #aaa; }
.log-entry.highlight { color: #f0c040; }

/* FIX 11: Reconnect overlay */
.reconnect-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); display: flex; align-items: center;
  justify-content: center; z-index: 1000; color: #f0c040;
  font-size: 20px; font-weight: 700; flex-direction: column; gap: 10px;
}

/* === END SCREEN === */
#end-screen {
  flex-direction: column; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, #1a4a2a 0%, #0f2e1a 70%);
  gap: 20px;
}
.end-title { font-size: 36px; font-weight: 900; color: #f0c040; }
.standings-list { list-style: none; width: 300px; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 16px; }
.standings-list li {
  padding: 10px 14px; display: flex; align-items: center; gap: 12px;
  font-size: 16px; border-radius: 6px;
}
.standings-list li + li { border-top: 1px solid rgba(255,255,255,0.05); }
.place-medal { font-size: 24px; width: 32px; text-align: center; }
.place-num { font-size: 14px; color: #888; width: 32px; text-align: center; }

/* === RESPONSIVE === */
@media (max-width: 600px) {
  #home-screen { padding-top: 40px; }
  .logo { font-size: 64px; }
  .home-form { width: 260px; }
  .rooms-section { width: 260px; }
  .room-code { font-size: 36px; }
  .player-list { width: 280px; }
  .card { width: 42px; height: 62px; }
  .card .rank { font-size: 14px; }
  .card .suit { font-size: 12px; }
  .game-log { width: 160px; font-size: 10px; }
  .opponent { min-width: 56px; padding: 6px 8px; }
  .combo-label { font-size: 16px; }
  .turn-status { font-size: 20px; }
  .action-bar .btn { min-width: 90px; font-size: 16px !important; padding: 10px 14px; }
}

@media (max-width: 380px) {
  .card { width: 36px; height: 54px; }
  .card .rank { font-size: 12px; }
  .card .suit { font-size: 10px; }
  .action-bar .btn { min-width: 80px; font-size: 15px !important; }
}
</style>
</head>
<body>

<!-- FIX 11: Reconnect overlay -->
<div class="reconnect-overlay hidden" id="reconnect-overlay">
  <div>Переподключение...</div>
  <div style="font-size:13px;color:#8ab89a">Восстанавливаем соединение</div>
</div>

<!-- === HOME SCREEN === -->
<div id="home-screen" class="screen active">
  <div class="logo">ZA</div>
  <div class="logo-sub">Карточная игра</div>
  <div class="home-form">
    <input type="text" id="nickname-input" placeholder="Ваш никнейм" maxlength="20" autocomplete="off">
    <div class="error-msg" id="home-error"></div>
    <button class="btn btn-primary" id="create-room-btn">Создать комнату</button>
    <button class="btn btn-secondary" id="show-join-btn">Войти по коду</button>
    <div class="join-section" id="join-section">
      <input type="text" id="room-code-input" placeholder="Код комнаты (ZA-XXXX)" maxlength="7" autocomplete="off" style="text-transform:uppercase">
      <button class="btn btn-primary" id="join-room-btn">Войти</button>
    </div>
  </div>
  <!-- FIX 2: Active rooms list -->
  <div class="rooms-section" id="rooms-section">
    <div class="rooms-title">Активные комнаты</div>
    <div class="rooms-list" id="rooms-list">
      <div class="no-rooms">Нет активных комнат</div>
    </div>
  </div>
</div>

<!-- === LOBBY SCREEN === -->
<div id="lobby-screen" class="screen">
  <button class="lobby-back" id="lobby-back-btn">&larr; Назад</button>
  <div class="room-code" id="lobby-room-code">ZA-XXXX</div>
  <!-- FIX 17: Share button -->
  <button class="share-btn" id="lobby-share-btn">Поделиться</button>
  <ul class="player-list" id="player-list"></ul>
  <div class="lobby-status" id="lobby-status">Ожидание игроков...</div>
  <button class="btn btn-primary" id="start-game-btn" style="width:300px" disabled>Начать игру</button>
</div>

<!-- === GAME SCREEN === -->
<div id="game-screen" class="screen">
  <!-- FIX 6: Timer bar -->
  <div class="timer-bar" id="timer-bar">
    <div class="timer-fill" id="timer-fill"></div>
    <span class="timer-text" id="timer-text">30</span>
  </div>

  <div class="opponents-row" id="opponents-row"></div>

  <div class="table-center">
    <!-- FIX 8: Turn status -->
    <div class="turn-status" id="turn-status"></div>
    <div class="table-cards" id="table-cards"></div>
    <div class="combo-label" id="combo-label"></div>
  </div>

  <!-- FIX 5: Observer banner -->
  <div class="observer-banner hidden" id="observer-banner"></div>

  <div class="hand-area" id="hand-area">
    <div class="hand-cards" id="hand-cards"></div>
  </div>

  <!-- FIX 1: Fixed bottom action bar -->
  <div class="action-bar" id="action-bar">
    <button class="btn btn-primary" id="play-btn" disabled>Сыграть</button>
    <button class="btn btn-pass" id="pass-btn">Пас</button>
    <button class="btn btn-autopass" id="autopass-btn">Автопас</button>
  </div>

  <!-- FIX 17: Share button in game -->
  <button class="share-game-btn" id="share-game-btn">Поделиться</button>

  <!-- FIX 12: Auto-pass banner -->
  <div class="autopass-banner hidden" id="autopass-banner">Автопас включён</div>

  <div class="game-log" id="game-log"></div>
</div>

<!-- === END SCREEN === -->
<div id="end-screen" class="screen">
  <div class="end-title">Игра окончена!</div>
  <ul class="standings-list" id="standings-list"></ul>
  <button class="btn btn-primary" id="play-again-btn" style="width:300px">Играть снова</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// === SOCKET & STATE ===
const socket = io({ reconnection: true, reconnectionDelay: 1000, reconnectionAttempts: Infinity });

const state = {
  myId: null,
  roomCode: null,
  isHost: false,
  players: [],
  yourHand: [],
  handOrder: [], // FIX 3: custom hand order for drag & drop
  selectedCards: [],
  tableCombo: null,
  tableComboName: '',
  currentPlayerId: null,
  turnOrder: [],
  standings: [],
  isObserver: false,    // FIX 2/5: observer mode
  isFinished: false,    // FIX 5: finished player observing
  autoPass: false,      // FIX 12: auto-pass toggle
  justDragged: false,   // FIX 3: prevent click after drag
};

// === CONSTANTS ===
const RANK_VALUE = { '4':1,'5':2,'6':3,'7':4,'8':5,'9':6,'10':7,'J':8,'Q':9,'K':10,'A':11,'2':12,'3':13,'JOK':14 };
const SUIT_SYMBOLS = { s: '\u2660', h: '\u2665', d: '\u2666', c: '\u2663' };

function getCardRank(id) {
  if (id.startsWith('JOK')) return 'JOK';
  if (id.startsWith('10')) return '10';
  return id.slice(0, -1);
}
function getCardSuit(id) {
  if (id.startsWith('JOK')) return null;
  if (id.startsWith('10')) return id.slice(2);
  return id.slice(-1);
}
function getCardValue(id) { return RANK_VALUE[getCardRank(id)]; }

// === SCREEN MANAGEMENT ===
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// === UI ELEMENTS ===
const $ = id => document.getElementById(id);

// === FIX 16: Load saved name ===
window.addEventListener('load', () => {
  const savedName = localStorage.getItem('za_player_name');
  if (savedName) $('nickname-input').value = savedName;

  const params = new URLSearchParams(window.location.search);
  const roomParam = params.get('room');
  if (roomParam) {
    $('room-code-input').value = roomParam.toUpperCase();
    $('join-section').classList.add('show');
  }
});

// FIX 16: Save name on input
$('nickname-input').addEventListener('input', () => {
  const val = $('nickname-input').value.trim();
  if (val) localStorage.setItem('za_player_name', val);
});

// === HOME SCREEN ===
$('show-join-btn').onclick = () => {
  $('join-section').classList.toggle('show');
};

$('create-room-btn').onclick = () => {
  const nick = $('nickname-input').value.trim();
  if (!nick) { $('home-error').textContent = 'Введите никнейм'; return; }
  $('home-error').textContent = '';
  localStorage.setItem('za_player_name', nick);
  socket.emit('create_room', { nickname: nick, maxPlayers: 8 });
};

$('join-room-btn').onclick = () => {

function renderRoomList(rooms) {

    return;

  rooms.forEach(room => {

    if (room.status === 'lobby' && room.playerCount < room.maxPlayers) {
      statusText = '\uD83D\uDFE1 Ожидание';
      statusClass = 'waiting';
      btnText = 'Войти';
      btnAction = () => {
        const nick = $('nickname-input').value.trim();

        localStorage.setItem('za_player_name', nick);
        socket.emit('join_room', { roomCode: room.code, nickname: nick });
      };
    } else if (room.status === 'playing') {
      statusText = '\uD83D\uDFE2 Идёт игра';
      statusClass = 'playing';
      btnText = 'Наблюдать';
      btnAction = () => {
        const nick = $('nickname-input').value.trim() || 'Observer';
        socket.emit('join_as_observer', { roomCode: room.code, nickname: nick });
      };
    } else {
      statusText = '\uD83D\uDD34 Полная';
      statusClass = 'full';
      btnText = 'В очередь';
      btnAction = () => {
        const nick = $('nickname-input').value.trim();
        if (!nick) { $('home-error').textContent = 'Введите никнейм'; return; }
        localStorage.setItem('za_player_name', nick);
        socket.emit('join_queue', { roomCode: room.code, nickname: nick });
      };

    const infoDiv = document.createElement('div');
    infoDiv.className = 'room-info';
    infoDiv.innerHTML = `

      <div class="room-host">${room.hostNickname} (${room.playerCount}/${room.maxPlayers})</div>

    btn.className = 'btn btn-primary btn-small';
    btn.textContent = btnText;
    btn.onclick = btnAction;

    item.appendChild(infoDiv);
    item.appendChild(btn);
    container.appendChild(item);
  });
}

// FIX 17: Share function
function shareRoom(roomCode) {
  const url = 'https://za-game-production.up.railway.app/?room=' + roomCode;

  if (navigator.share) {
    navigator.share({ title: 'ZA — Карточная игра', text: 'Присоединяйся к игре!', url })
      .catch(() => copyToClipboard(url));
  } else {
    copyToClipboard(url);
  }
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    showToast('Ссылка скопирована!');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    showToast('Ссылка скопирована!');
  });
}

function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// === CARD RENDERING ===
function createCardEl(cardId, opts = {}) {
  const el = document.createElement('div');
  el.className = 'card';
  if (opts.tableCard) el.classList.add('table-card');

  const rank = getCardRank(cardId);
  const suit = getCardSuit(cardId);

  if (rank === 'JOK') {
    el.classList.add('joker');
    el.innerHTML = '<span class="suit">\u2605</span><span class="rank">JOKER</span>';
    return el;
  }

  const isRed = suit === 'h' || suit === 'd';
  el.classList.add(isRed ? 'red' : 'black');
  el.innerHTML = `<span class="rank">${rank}</span><span class="suit">${SUIT_SYMBOLS[suit] || ''}</span>`;
  return el;
}

// === FIX 3: Hand order management ===
function updateHandOrder(newHand) {
  // Remove cards no longer in hand
  state.handOrder = state.handOrder.filter(c => newHand.includes(c));
  // Add new cards (sorted) at end
  const newCards = newHand.filter(c => !state.handOrder.includes(c));
  newCards.sort((a, b) => getCardValue(a) - getCardValue(b));
  state.handOrder.push(...newCards);
}

// FIX 3: Render hand with drag & drop
function renderHand() {
  const container = $('hand-cards');
  container.innerHTML = '';

  // Use handOrder for rendering (preserves custom order)
  state.handOrder.forEach((cardId, index) => {
    const el = createCardEl(cardId);
    if (state.selectedCards.includes(cardId)) el.classList.add('selected');

    // Click to select
    el.onclick = () => {
      if (state.justDragged) { state.justDragged = false; return; }
      const idx = state.selectedCards.indexOf(cardId);
      if (idx === -1) {
        state.selectedCards.push(cardId);
      } else {
        state.selectedCards.splice(idx, 1);
      }
      renderHand();
      updatePlayButton();
    };

    // FIX 3: HTML5 Drag & Drop
    el.draggable = true;
    el.dataset.cardId = cardId;
    el.dataset.index = String(index);

    el.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', cardId);
      e.dataTransfer.effectAllowed = 'move';
      el.classList.add('dragging');
      state.draggedCardId = cardId;
    });

    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      state.draggedCardId = null;
      container.querySelectorAll('.card').forEach(c => {
        c.classList.remove('drag-over-left', 'drag-over-right');
      });
    });

    el.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const rect = el.getBoundingClientRect();
      const midX = rect.left + rect.width / 2;
      container.querySelectorAll('.card').forEach(c => {
        c.classList.remove('drag-over-left', 'drag-over-right');
      });
      if (e.clientX < midX) {
        el.classList.add('drag-over-left');
      } else {
        el.classList.add('drag-over-right');
      }
    });

    el.addEventListener('dragleave', () => {
      el.classList.remove('drag-over-left', 'drag-over-right');
    });

    el.addEventListener('drop', (e) => {
      e.preventDefault();
      const draggedId = e.dataTransfer.getData('text/plain');
      if (draggedId && draggedId !== cardId) {
        const fromIdx = state.handOrder.indexOf(draggedId);
        const toIdx = state.handOrder.indexOf(cardId);
        if (fromIdx !== -1 && toIdx !== -1) {
          state.handOrder.splice(fromIdx, 1);
          // Determine insert position based on mouse position
          const rect = el.getBoundingClientRect();
          const midX = rect.left + rect.width / 2;
          const newToIdx = state.handOrder.indexOf(cardId);
          if (e.clientX < midX) {
            state.handOrder.splice(newToIdx, 0, draggedId);
          } else {
            state.handOrder.splice(newToIdx + 1, 0, draggedId);
          }
          renderHand();
        }
      }
      container.querySelectorAll('.card').forEach(c => {
        c.classList.remove('drag-over-left', 'drag-over-right');
      });
    });

    // FIX 3: Touch events for mobile drag & drop
    let touchTimer = null;
    let touchState = null;

    el.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      touchState = {
        cardId,
        startX: touch.clientX,
        startY: touch.clientY,
        isDragging: false,
        clone: null,
      };
      touchTimer = setTimeout(() => {
        if (touchState) {
          touchState.isDragging = true;
          el.classList.add('dragging');
          // Create visual clone
          const clone = el.cloneNode(true);
          clone.style.position = 'fixed';
          clone.style.zIndex = '1000';
          clone.style.opacity = '0.8';
          clone.style.pointerEvents = 'none';
          clone.style.width = el.offsetWidth + 'px';
          clone.style.left = (touch.clientX - el.offsetWidth / 2) + 'px';
          clone.style.top = (touch.clientY - el.offsetHeight / 2) + 'px';
          clone.style.transform = 'scale(1.1)';
          document.body.appendChild(clone);
          touchState.clone = clone;
        }
      }, 250);
    }, { passive: true });

    el.addEventListener('touchmove', (e) => {
      if (!touchState) return;
      const touch = e.touches[0];
      const dx = Math.abs(touch.clientX - touchState.startX);
      const dy = Math.abs(touch.clientY - touchState.startY);

      if (!touchState.isDragging) {
        if (dx > 10 || dy > 10) {
          clearTimeout(touchTimer);
          touchState = null;
          return;
        }
        return;
      }

      e.preventDefault();
      if (touchState.clone) {
        touchState.clone.style.left = (touch.clientX - el.offsetWidth / 2) + 'px';
        touchState.clone.style.top = (touch.clientY - el.offsetHeight / 2) + 'px';
      }

      // Highlight drop target
      container.querySelectorAll('.card').forEach(c => {
        c.classList.remove('drag-over-left', 'drag-over-right');
      });
      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      if (target) {
        const targetCard = target.closest('.card');
        if (targetCard && targetCard !== el) {
          const rect = targetCard.getBoundingClientRect();
          if (touch.clientX < rect.left + rect.width / 2) {
            targetCard.classList.add('drag-over-left');
          } else {
            targetCard.classList.add('drag-over-right');
          }
        }
      }
    }, { passive: false });

    el.addEventListener('touchend', (e) => {
      clearTimeout(touchTimer);
      if (!touchState) return;

      if (touchState.isDragging) {
        const touch = e.changedTouches[0];
        if (touchState.clone) touchState.clone.remove();
        el.classList.remove('dragging');

        // Find drop target
        const target = document.elementFromPoint(touch.clientX, touch.clientY);
        if (target) {
          const targetCard = target.closest('.card');
          if (targetCard && targetCard.dataset.cardId && targetCard.dataset.cardId !== touchState.cardId) {
            const fromIdx = state.handOrder.indexOf(touchState.cardId);
            const targetId = targetCard.dataset.cardId;
            if (fromIdx !== -1) {
              state.handOrder.splice(fromIdx, 1);
              const rect = targetCard.getBoundingClientRect();
              const newToIdx = state.handOrder.indexOf(targetId);
              if (touch.clientX < rect.left + rect.width / 2) {
                state.handOrder.splice(newToIdx, 0, touchState.cardId);
              } else {
                state.handOrder.splice(newToIdx + 1, 0, touchState.cardId);
              }
            }
          }
        }

        container.querySelectorAll('.card').forEach(c => {
          c.classList.remove('drag-over-left', 'drag-over-right');
        });

        state.justDragged = true;
        setTimeout(() => { state.justDragged = false; }, 100);
        renderHand();
      }
      touchState = null;
    });

    el.addEventListener('touchcancel', () => {
      clearTimeout(touchTimer);
      if (touchState && touchState.clone) touchState.clone.remove();
      el.classList.remove('dragging');
      touchState = null;
    });

    container.appendChild(el);
  });
}

function updatePlayButton() {
  const isMyTurn = state.currentPlayerId === state.myId;
  const hasSelection = state.selectedCards.length > 0;
  $('play-btn').disabled = !isMyTurn || !hasSelection || state.isObserver || state.isFinished;
  $('pass-btn').disabled = !isMyTurn || !state.tableCombo || state.isObserver || state.isFinished;
}

// FIX 8: Turn status in center of table
function renderTurnStatus() {
  const el = $('turn-status');
  if (state.currentPlayerId === state.myId && !state.isObserver && !state.isFinished) {
    el.textContent = 'Ваш ход!';
    el.className = 'turn-status your-turn';
  } else {
    const p = state.players.find(pl => pl.id === state.currentPlayerId);
    el.textContent = p ? `Ход: ${p.nickname}` : '';
    el.className = 'turn-status other-turn';
  }
  // Fade-in animation
  el.style.opacity = '0';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      el.style.opacity = '1';
    });
  });
}

function renderGame() {
  renderOpponents();
  renderTableCards();
  renderTurnStatus();

  if (state.isObserver || state.isFinished) {
    $('hand-area').style.display = 'none';
    $('observer-banner').classList.remove('hidden');
    $('observer-banner').textContent = state.isFinished
      ? 'Вы закончили! Наблюдаете за игрой...'
      : 'Режим наблюдателя';
    // Hide action buttons for observers
    $('action-bar').style.display = state.isFinished ? 'none' : 'none';
  } else {
    $('hand-area').style.display = '';
    $('observer-banner').classList.add('hidden');
    $('action-bar').style.display = '';
    renderHand();
  }

  updatePlayButton();
}

  while (log.children.length > 2) log.removeChild(log.firstChild);
}

// === FIX 6: Timer display ===
function updateTimer(secondsLeft) {
  const fill = $('timer-fill');
  const text = $('timer-text');
  const pct = Math.max(0, (secondsLeft / 30) * 100);
  fill.style.width = pct + '%';
  text.textContent = secondsLeft;

  if (secondsLeft <= 5) {
    fill.style.background = '#e74c3c';
  } else if (secondsLeft <= 15) {
    fill.style.background = '#f0c040';

});

socket.on('player_passed', ({ playerId, nickname }) => {
  addLog(`${nickname} пасует`);
});

socket.on('player_finished', ({ nickname, place }) => {
  addLog(`${nickname} вышел (${place} место)!`, true);
});

// FIX 5: Finished player becomes observer
socket.on('you_are_observer', ({ message }) => {
  state.isFinished = true;
  renderGame();
});

socket.on('trick_won', ({ playerId, nickname }) => {
  addLog(`${nickname} забирает раунд!`, true);
  showTrickWon(nickname);
});

// FIX 6: Timer tick
socket.on('timer_tick', ({ secondsLeft }) => {
  updateTimer(secondsLeft);
});

socket.on('game_over', ({ standings }) => {
  state.standings = standings;
  state.isFinished = false;
  state.isObserver = false;
  state.autoPass = false;
  showScreen('end-screen');
  renderStandings();
  $('play-again-btn').style.display = state.isHost ? 'block' : 'none';
});

socket.on('back_to_lobby', ({ players }) => {
  state.players = players;
  state.tableCombo = null;
  state.tableComboName = '';
  state.yourHand = [];
  state.handOrder = [];
  state.selectedCards = [];
  state.isFinished = false;
  state.isObserver = false;
  state.autoPass = false;
  $('autopass-btn').classList.remove('active');
  $('autopass-banner').classList.add('hidden');
  showScreen('lobby-screen');
  renderLobby();
});

// FIX 11: Rejoin success
socket.on('rejoin_success', ({ roomCode, playerId, gameState, isFinished }) => {
  state.roomCode = roomCode;
  state.isFinished = isFinished || false;
  state.isObserver = false;
  sessionStorage.setItem('za_room_code', roomCode);
  sessionStorage.setItem('za_player_id', playerId);

  state.yourHand = gameState.yourHand;
  state.handOrder = [...gameState.yourHand];
  state.tableCombo = gameState.tableCombo;
  state.tableComboName = gameState.tableComboName;
  state.players = gameState.players;
  state.currentPlayerId = gameState.currentPlayerId;
  state.selectedCards = [];

  const me = state.players.find(p => p.id === state.myId);
  if (me) state.isHost = me.isHost;

  showScreen('game-screen');
  renderGame();
});

socket.on('rejoin_failed', () => {
  sessionStorage.removeItem('za_room_code');
  sessionStorage.removeItem('za_player_id');
});

socket.on('invalid_move', ({ reason }) => {
  showInvalidTooltip(reason);
});

socket.on('error', ({ message }) => {
  $('home-error').textContent = message;
});
</script>
</body>
</html>
